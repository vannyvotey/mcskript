<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins | VannyDev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #090412; --sidebar-bg: #06020d; --purple: #a855f7; --btn-shadow: #6b21a8; --font-h: 'Poppins', sans-serif; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 50px 25px; border-right: 1px solid rgba(255,255,255,0.03); }
        .sidebar h2 { font-family: var(--font-h); font-size: 1.8rem; margin-bottom: 50px; }
        .sidebar h2 span { color: var(--purple); }
        .nav { color: #555; text-decoration: none; display: flex; align-items: center; padding: 15px 20px; border-radius: 15px; margin-bottom: 10px; font-weight: 600; transition: 0.3s; }
        .nav i { margin-right: 15px; font-size: 1.1rem; }
        .nav:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .nav.active { background: linear-gradient(to right, rgba(168, 85, 247, 0.15), transparent); color: #fff; border-left: 4px solid var(--purple); }
        .content { margin-left: 280px; padding: 60px; width: 100%; }
        h1 { font-family: var(--font-h); font-size: 3rem; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; overflow: hidden; transition: 0.4s ease; }
        .card:hover { transform: translateY(-10px); border-color: var(--purple); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .img-slot { width: 100%; height: 220px; background: #140826; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-body { padding: 40px; }
        h3 { font-family: var(--font-h); font-size: 1.6rem; margin: 0 0 15px 0; }
        p { color: #777; line-height: 1.8; margin-bottom: 35px; min-height: 54px; }
        .btn-3d { 
            display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, var(--purple), #7e22ce);
            color: #fff; text-decoration: none; padding: 18px; border-radius: 20px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
            box-shadow: 0 8px 0 var(--btn-shadow), 0 15px 25px rgba(0,0,0,0.3); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-3d i { margin-right: 10px; }
        .btn-3d:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--btn-shadow); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>VANNY<span>DEV</span></h2>
        <a href="index.html" class="nav"><i class="fa-solid fa-house"></i> Dashboard</a>

        <a href="plugins.html" class="nav active"><i class="fa-solid fa-gears"></i> Plugins</a>
        <a href="configs.html" class="nav"><i class="fa-solid fa-sliders"></i> Configs</a>
    </div>
    <div class="content">
        <h1>Java Plugins</h1>
        <div class="grid">
            <div class="card">
                <div class="img-slot"><img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=800" style="width:100%;height:100%;object-fit:cover;"></div>
                <div class="card-body">
                    <h3>VannyAntiLag Pro</h3>
                    <p>High-performance entity and redstone manager to keep your server TPS at a solid 20.0.</p>
                    <a href="#" class="btn-3d"><i class="fa-solid fa-download"></i> Download .JAR</a>
                </div>
            </div>
            <div class="card">
                <div class="img-slot"><img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=800" style="width:100%;height:100%;object-fit:cover;"></div>
                <div class="card-body">
                    <h3>SecureGuard</h3>
                    <p>Advanced security plugin with IP-locking and staff authentication systems.</p>
                    <a href="#" class="btn-3d"><i class="fa-solid fa-download"></i> Download .JAR</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
